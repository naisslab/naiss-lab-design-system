<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="meta">Spacing · 4px base scale</div>
<div style="display:flex;align-items:flex-end;gap:12px;height:80px">
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:4px;height:4px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">4</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:8px;height:8px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">8</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:12px;height:12px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">12</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:16px;height:16px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">16</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:24px;height:24px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">24</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:32px;height:32px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">32</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:48px;height:48px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">48</div></div>
<div style="display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:64px;height:64px;background:#006B37"></div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">64</div></div>
</div>
</div></body></html>
